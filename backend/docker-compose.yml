version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: devpulse-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: devpulse
      MONGO_INITDB_ROOT_PASSWORD: devpulse_secret
      MONGO_INITDB_DATABASE: devpulse
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7.2-alpine
    container_name: devpulse-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
  redis_data:
